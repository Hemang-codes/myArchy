# Move kitty to 100 100 and add an anim style
windowrule {
  name = move-Alacritty
  match:class = Alacritty

  float = on
  center = on
  animation = popin
  size = 700 500
}
windowrule {
  name = move-org.gnome.Nautilus
  match:class = org.gnome.Nautilus

  float = on
  center = on
  animation = popin
  size = 700 400
}
windowrule {
    name = btop-float
    match:class = Alacritty
    match:title = btop 

    size = 750 700
  }

windowrule {
    name = wifitui-float
    match:class = Alacritty
    match:title = wifitui 

    size = 600 500
  }

#windowrule = move (cursor_x-(window_w*0.5)) (cursor_y-(window_h*0.5)), match:class kitty  
windowrule = match:class Alacritty, rounding 10                                               # Set rounding to 10 for kitty
windowrule = match:class (pinentry-)(.*), stay_focused on

#windowrule = hyprbars:no_bar on, match:class ^(Alacritty)$

