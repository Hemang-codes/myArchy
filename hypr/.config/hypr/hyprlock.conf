background {
    monitor =
    path = ~/Pictures/wallpaper/wall3.png  # Supports png, jpg, webp (or 'screenshot')
    color = rgba(127, 122, 100, 1.0)
    blur_passes = 2 
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    outer_color = rgb(64, 77, 65)
    inner_color = rgb(127,122,100)
    font_color = rgb(26,30,33)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

